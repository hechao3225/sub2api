services:
  sub2api:
    image: ${SUB2API_IMAGE}
    container_name: sub2api
    restart: unless-stopped
    init: true
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "${BIND_HOST:-127.0.0.1}:${SERVER_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data:Z
    environment:
      AUTO_SETUP: "true"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_MODE: "${SERVER_MODE:-release}"
      RUN_MODE: "${RUN_MODE:-standard}"
      TZ: "${TZ:-Asia/Shanghai}"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: "${POSTGRES_USER}"
      DATABASE_PASSWORD: "${POSTGRES_PASSWORD}"
      DATABASE_DBNAME: "${POSTGRES_DB}"
      DATABASE_SSLMODE: disable
      DATABASE_MAX_OPEN_CONNS: "${DATABASE_MAX_OPEN_CONNS:-20}"
      DATABASE_MAX_IDLE_CONNS: "${DATABASE_MAX_IDLE_CONNS:-5}"
      DATABASE_CONN_MAX_LIFETIME_MINUTES: "${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}"
      DATABASE_CONN_MAX_IDLE_TIME_MINUTES: "${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_POOL_SIZE: "${REDIS_POOL_SIZE:-64}"
      REDIS_MIN_IDLE_CONNS: "${REDIS_MIN_IDLE_CONNS:-4}"
      REDIS_ENABLE_TLS: "false"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRE_HOUR: "24"
      TOTP_ENCRYPTION_KEY: "${TOTP_ENCRYPTION_KEY}"
      SECURITY_URL_ALLOWLIST_ENABLED: "${SECURITY_URL_ALLOWLIST_ENABLED:-false}"
      SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP: "${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}"
      SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS: "${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-false}"
      GATEWAY_OPENAI_RESPONSE_HEADER_TIMEOUT: "${GATEWAY_OPENAI_RESPONSE_HEADER_TIMEOUT:-0}"
      GATEWAY_OPENAI_HTTP2_ENABLED: "${GATEWAY_OPENAI_HTTP2_ENABLED:-true}"
      GATEWAY_OPENAI_HTTP2_ALLOW_PROXY_FALLBACK_TO_HTTP1: "${GATEWAY_OPENAI_HTTP2_ALLOW_PROXY_FALLBACK_TO_HTTP1:-true}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      LOG_ENV: "${LOG_ENV:-production}"
      LOG_OUTPUT_TO_STDOUT: "${LOG_OUTPUT_TO_STDOUT:-true}"
      LOG_OUTPUT_TO_FILE: "${LOG_OUTPUT_TO_FILE:-true}"
      LOG_ROTATION_MAX_SIZE_MB: "${LOG_ROTATION_MAX_SIZE_MB:-50}"
      LOG_ROTATION_MAX_BACKUPS: "${LOG_ROTATION_MAX_BACKUPS:-5}"
      LOG_ROTATION_MAX_AGE_DAYS: "${LOG_ROTATION_MAX_AGE_DAYS:-7}"
      LOG_ROTATION_COMPRESS: "${LOG_ROTATION_COMPRESS:-true}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [sub2api-network]
    mem_limit: 768m
    cpus: 1.25
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: sub2api-postgres
    restart: unless-stopped
    init: true
    volumes:
      - ./postgres_data:/var/lib/postgresql/data:Z
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
      PGDATA: /var/lib/postgresql/data
      TZ: "${TZ:-Asia/Shanghai}"
    networks: [sub2api-network]
    mem_limit: 512m
    cpus: 0.75
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: ${REDIS_IMAGE}
    container_name: sub2api-redis
    restart: unless-stopped
    init: true
    volumes:
      - ./redis_data:/data:Z
    command: >-
      redis-server --appendonly yes --appendfsync everysec --save 60 1
      --maxclients ${REDIS_MAXCLIENTS:-256}
      --requirepass ${REDIS_PASSWORD}
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      REDISCLI_AUTH: "${REDIS_PASSWORD}"
    networks: [sub2api-network]
    mem_limit: 192m
    cpus: 0.25
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  sub2api-network:
    driver: bridge
